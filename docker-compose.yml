version: '3.8'

services:
  smart-parser-ui:
    build: .
    container_name: smart-parser-ui
    ports:
      - "8501:8501"
    volumes:
      # THE BIND MOUNT: This maps your current local folder directly to /app in the container.
      # This guarantees Docker sees 'Configuration.py' exactly as it exists on your machine.
      - .:/app
    environment:
      # Ensures Python prints logs immediately to your terminal
      - PYTHONUNBUFFERED=1
    restart: unless-stopped